services:
  # BACKEND — Node.js API (base de datos en Supabase)
  - type: web
    name: aerocore-api
    runtime: node
    region: oregon
    plan: free
    rootDir: vuelos-backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: IDENTITY_DATABASE_URL
        sync: false
      - key: CATALOG_DATABASE_URL
        sync: false
      - key: BOOKING_DATABASE_URL
        sync: false
      - key: PAYMENTS_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        value: aerocore-api
      - key: JWT_AUDIENCE
        value: aerocore-client
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: FRONTEND_URL
        value: https://aerocore-frontend-issd.onrender.com

  # FRONTEND — Vue / Vite Static Site
  - type: web
    name: aerocore-frontend
    runtime: static
    rootDir: front-vue/front-vue
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://aerocore-api-issd.onrender.com/api/v1/yulieth-galarza
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
