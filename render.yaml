services:
  # BACKEND — Node.js API
  - type: web
    name: aerocore-api
    runtime: node
    region: oregon
    plan: free
    rootDir: vuelos-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        value: aerocore-api
      - key: JWT_AUDIENCE
        value: aerocore-client
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: FRONTEND_URL
        value: https://aerocore-frontend.onrender.com   # Pon la URL real después de desplegar

  # FRONTEND — Vue / Vite Static Site
  - type: static
    name: aerocore-frontend
    rootDir: front-vue          # Ajusta según tu estructura real
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://aerocore-api.onrender.com/api/v1/yulieht-galarza   # Se inyecta en el build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
