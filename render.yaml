databases:
  - name: aerocore-db
    databaseName: aerocore
    user: aerocore_user
    plan: free

services:
  # BACKEND — Node.js API
  - type: web
    name: aerocore-api
    runtime: node
    region: oregon
    plan: free
    rootDir: vuelos-backend
    buildCommand: npm install && npm run build && npx prisma db push --accept-data-loss && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aerocore-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: aerocore-api
      - key: JWT_AUDIENCE
        value: aerocore-client
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: FRONTEND_URL
        value: https://aerocore-frontend.onrender.com

  # FRONTEND — Vue / Vite Static Site
  - type: static
    name: aerocore-frontend
    rootDir: front-vue/front-vue
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://aerocore-api.onrender.com/api/v1/yulieth-galarza
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
