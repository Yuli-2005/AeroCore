          description: Código IATA del aeropuerto de origen
        - name: destination
          in: query
          required: true
          schema: { type: string, example: BOG }
          description: Código IATA del aeropuerto de destino
        - name: date
          in: query
          required: true
          schema: { type: string, format: date, example: "2026-05-23" }
          description: Fecha de salida (YYYY-MM-DD)
        - name: passengers
          in: query
          schema: { type: integer, minimum: 1, maximum: 9, default: 1 }
          description: Número de pasajeros
        - name: class
          in: query
          schema: { type: string, enum: [ECONOMY, PREMIUM_ECONOMY, BUSINESS, FIRST] }
          description: Clase de cabina
      responses:
        '200':
          description: Vuelos disponibles
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Flight' }
              example:
                success: true
                data:
                  - id: cmpizkajw0016ru3piuynlykq
                    originAirportIata: UIO
                    destinationAirportIata: BOG
                    departureDate: "2026-05-23"
                    status: SCHEDULED
                    flightClasses:
                      - id: cmpizkajw0019ru3prrxm9wmc
                        cabinClass: ECONOMY
                        availableSeats: 120
                        basePrice: 135.00
                      - id: cmpizkajw001aru3ppr4jjfko
                        cabinClass: BUSINESS
                        availableSeats: 12
                        basePrice: 380.00
                    segments:
                      - segmentNumber: AV201
                        departureDateTime: "2026-05-23T13:00:00.000Z"
                        arrivalDateTime: "2026-05-23T14:35:00.000Z"
                        estimatedDuration: 95
                        originAirport:
                          iataCode: UIO
                          name: Aeropuerto Mariscal Sucre
                          city: { name: Quito }
                        destinationAirport:
                          iataCode: BOG
                          name: Aeropuerto El Dorado
                          city: { name: Bogotá }
                        airline: { name: Avianca, iataCode: AV }
        '400': { $ref: '#/components/responses/BadRequest' }

