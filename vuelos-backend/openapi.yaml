  # ── RESERVATIONS ─────────────────────────────────────────────
  /reservations:
    get:
      operationId: listReservations
      tags: [Reservations]
      summary: Listar todas las reservas (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Lista de reservas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Reservation' }
    post:
      operationId: createReservation
      tags: [Reservations]
      summary: Crear reserva (usuario autenticado)
      description: |
        Crea la reserva de forma atómica:
        1. Verifica disponibilidad de asientos
        2. Aplica descuento si se envía `promotionCode`
        3. Crea reserva + pasajeros
        4. Decrementa `availableSeats`
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReservationRequest' }
            examples:
              sin_descuento:
                summary: Reserva básica — UIO→BOG Economía ($135)
                value:
                  flightClassId: cmpizkajw0019ru3prrxm9wmc
                  passengers:
                    - firstName: Carlos
                      lastName: Mendoza
                      documentNumber: A9876543
              con_descuento:
                summary: Con código de descuento DESCUENTO10
                value:
                  flightClassId: cmpizkajw0019ru3prrxm9wmc
                  passengers:
                    - firstName: Ana
                      lastName: Torres
                      documentNumber: B1234567
                  promotionCode: DESCUENTO10
              business_class:
                summary: Business class — UIO→BOG ($380)
                value:
                  flightClassId: cmpizkajw001aru3ppr4jjfko
                  passengers:
                    - firstName: Luis
                      lastName: Vargas
                      documentNumber: C9988776
      responses:
        '201':
          description: Reserva creada exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Reservation' }
              example:
                success: true
                data:
                  id: res-0001-0000-0000-000000000001
                  reservationCode: RES-ABCD1234
                  status: CONFIRMED
                  totalAmount: 160.00
                  createdAt: "2026-05-23T12:00:00.000Z"
                  passengers:
                    - id: pas-0001-0000-0000-000000000001
                      firstName: Juan
                      lastName: Pérez
                      documentNumber: A1234567
                      seatNumber: 14C
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/NoAvailability' }

  /reservations/my:
    get:
      operationId: listMyReservations
      tags: [Reservations]
      summary: Mis reservas (usuario autenticado)
