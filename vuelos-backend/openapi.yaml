    post:
      operationId: validatePromotion
      tags: [Promotions]
      summary: Validar código de promoción (público — no requiere auth)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, amount]
              properties:
                code:   { type: string, example: DESCUENTO10 }
                amount: { type: number, example: 135.00 }
            examples:
              porcentaje:
                summary: DESCUENTO10 — 10% sobre $135
                value:
                  code: DESCUENTO10
                  amount: 135.00
              monto_fijo:
                summary: VIAJERO20 — $20 fijo sobre $135
                value:
                  code: VIAJERO20
                  amount: 135.00
      responses:
        '200':
          description: Resultado de la validación
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          valid:          { type: boolean }
                          code:           { type: string }
                          discountType:   { type: string, enum: [PERCENTAGE, FIXED_AMOUNT] }
                          discountValue:  { type: number }
                          discountAmount: { type: number }
                          finalAmount:    { type: number }
              example:
                success: true
                data:
                  valid: true
                  code: DESCUENTO10
                  discountType: PERCENTAGE
                  discountValue: 10
                  discountAmount: 13.50
                  finalAmount: 121.50
        '400': { $ref: '#/components/responses/BadRequest' }

