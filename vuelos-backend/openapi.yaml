  # ── PAYMENTS ─────────────────────────────────────────────────
  /payments:
    get:
      operationId: listPayments
      tags: [Payments]
      summary: Listar todos los pagos (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Lista de pagos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Payment' }
    post:
      operationId: createPayment
      tags: [Payments]
      summary: Registrar pago de una reserva
      description: Registra el pago y genera la factura automáticamente (IVA 15%).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reservationId, amount, provider, transactionId]
              properties:
                reservationId: { type: string, format: uuid }
                amount:        { type: number, example: 150.00 }
                provider:      { type: string, enum: [VISA, MASTERCARD, AMEX, PAYPAL, TRANSFER], example: VISA }
                transactionId: { type: string, example: TXN-1714608000000-ABC123 }
                status:        { type: string, enum: [PENDING, COMPLETED, FAILED, REFUNDED], default: COMPLETED }
            example:
              reservationId: res-0001-0000-0000-000000000001
              amount: 160.00
              provider: VISA
              transactionId: TXN-1716460800000-XYZ789
      responses:
        '201':
          description: Pago registrado — factura generada automáticamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Payment' }
              example:
                success: true
                data:
                  id: pay-0001-0000-0000-000000000001
                  reservationId: res-0001-0000-0000-000000000001
                  amount: 160.00
                  status: COMPLETED
                  provider: VISA
