openapi: 3.0.3
info:
  title: "Yulieth Galarza Booking API"
  version: "1.0.0"
  description: "API publica para que Booking consulte vuelos y realice reservas desde el modulo de vuelos de Yulieth Galarza"

servers:
  - url: https://aerocore-api-issd.onrender.com/api/v1/yulieth-galarza
    description: Producción AeroCore (Render)
  - url: http://localhost:3000/api/v1/yulieth-galarza
    description: Desarrollo local

security: []

# ============================================================
#   SCHEMAS
# ============================================================
components:
  schemas:

    MetaEnvelope:
      type: object
      properties:
        success:    { type: boolean, example: true }
        owner:      { type: string,  example: "Yulieth Galarza" }
        api:        { type: string,  example: "Yulieth Galarza Booking API" }
        version:    { type: string,  example: "1.0.0" }
        module:     { type: string,  example: "booking" }
        visibility: { type: string,  example: "public" }
        auth:       { type: string,  example: "none" }
        data:       {}

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          properties:
            code:    { type: string,  example: "NOT_FOUND" }
            message: { type: string,  example: "Descripción del error" }

    Airport:
      type: object
      properties:
        id:       { type: string }
        iataCode: { type: string, example: "UIO" }
        name:     { type: string, example: "Aeropuerto Mariscal Sucre" }
        timezone: { type: string, example: "America/Guayaquil" }
        city:
          type: object
          properties:
            id:   { type: string }
            name: { type: string, example: "Quito" }
            country:
              type: object
              properties:
                id:      { type: string }
                name:    { type: string, example: "Ecuador" }
                isoCode: { type: string, example: "EC" }

    FlightClass:
      type: object
      properties:
        id:             { type: string }
        flightId:       { type: string }
        cabinClass:     { type: string, enum: [ECONOMY, PREMIUM_ECONOMY, BUSINESS, FIRST] }
        availableSeats: { type: integer, minimum: 0 }
        basePrice:      { type: number,  example: 89.00 }

    Flight:
      type: object
      properties:
        id:                     { type: string }
        flightNumber:           { type: string, nullable: true }
        originAirportIata:      { type: string, example: "UIO" }
        destinationAirportIata: { type: string, example: "BOG" }
        departureDate:          { type: string, format: date }
        departureDateTime:      { type: string, format: date-time, nullable: true }
        arrivalDateTime:        { type: string, format: date-time, nullable: true }
        duration:               { type: integer, description: "Duración total en minutos", nullable: true }
        stops:                  { type: integer, nullable: true }
        lowestPrice:            { type: number,  nullable: true }
        status:                 { type: string, enum: [SCHEDULED, DELAYED, CANCELLED, COMPLETED] }
        airline:
          nullable: true
          type: object
          properties:
            id:       { type: string }
            iataCode: { type: string, example: "AV" }
            name:     { type: string, example: "Avianca" }
            logoUrl:  { type: string, nullable: true }
        flightClasses:
          type: array
          items: { $ref: '#/components/schemas/FlightClass' }

    Passenger:
      type: object
      required: [firstName, lastName, documentNumber]
      properties:
        firstName:      { type: string, example: "Juan" }
        lastName:       { type: string, example: "Pérez" }
        documentNumber: { type: string, example: "1234567890" }
        seatNumber:     { type: string, nullable: true, example: "14C" }
        flightClassId:  { type: string }

    Reservation:
      type: object
      properties:
        id:              { type: string }
        reservationCode: { type: string, example: "A3F7B2C1" }
        status:          { type: string, enum: [PENDING, CONFIRMED, CANCELLED, COMPLETED] }
        totalAmount:     { type: number }
        createdAt:       { type: string, format: date-time }
        flightId:        { type: string }
        promotionId:     { type: string, nullable: true }
        passengers:
          type: array
          items: { $ref: '#/components/schemas/Passenger' }

    Payment:
      type: object
      properties:
        id:            { type: string }
        reservationId: { type: string }
        amount:        { type: number }
        provider:      { type: string, example: "VISA" }
        transactionId: { type: string }
        status:        { type: string, enum: [PENDING, COMPLETED, FAILED, REFUNDED] }
        createdAt:     { type: string, format: date-time }

  responses:
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    BadRequest:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

# ============================================================
#   PATHS
# ============================================================
paths:

  # ── ESTADO DE LA API ─────────────────────────────────────────
  /:
    get:
      tags: [Status]
      summary: Estado de la API
      description: Retorna información general del servicio, módulo y visibilidad.
      responses:
        '200':
          description: API operativa
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:       { type: string, example: "online" }
                          endpoints:    { type: integer, example: 10 }

  # ── AIRPORTS ─────────────────────────────────────────────────
  /airports:
    get:
      tags: [Airports]
      summary: Listar aeropuertos
      description: Retorna la lista completa de aeropuertos con ciudad y país.
      responses:
        '200':
          description: Lista de aeropuertos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Airport' }

  # ── FLIGHTS ──────────────────────────────────────────────────
  /flights/search:
    get:
      tags: [Flights]
      summary: Buscar vuelos disponibles
      description: Filtra vuelos por origen, destino, fecha, número de pasajeros y clase de cabina.
      parameters:
        - name: origin
          in: query
          required: true
          schema: { type: string, example: "UIO" }
          description: Código IATA del aeropuerto de origen
        - name: destination
          in: query
          required: true
          schema: { type: string, example: "BOG" }
          description: Código IATA del aeropuerto de destino
        - name: date
          in: query
          required: true
          schema: { type: string, format: date, example: "2025-06-15" }
          description: Fecha de salida (YYYY-MM-DD)
        - name: passengers
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1, example: 2 }
          description: Número de pasajeros
        - name: class
          in: query
          required: false
          schema: { type: string, enum: [ECONOMY, PREMIUM_ECONOMY, BUSINESS, FIRST], default: ECONOMY }
          description: Clase de cabina deseada
      responses:
        '200':
          description: Vuelos encontrados
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Flight' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /flights/{flightId}:
    parameters:
      - name: flightId
        in: path
        required: true
        schema: { type: string }
        description: ID del vuelo
    get:
      tags: [Flights]
      summary: Detalle de un vuelo
      responses:
        '200':
          description: Vuelo encontrado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Flight' }
        '404': { $ref: '#/components/responses/NotFound' }

  /flights/{flightId}/availability:
    parameters:
      - name: flightId
        in: path
        required: true
        schema: { type: string }
        description: ID del vuelo
    get:
      tags: [Flights]
      summary: Disponibilidad de asientos por clase
      description: Retorna las clases de vuelo con asientos disponibles y precio base.
      responses:
        '200':
          description: Disponibilidad por clase
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/FlightClass' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── RESERVATIONS ─────────────────────────────────────────────
  /reservations:
    post:
      tags: [Reservations]
      summary: Crear reserva
      description: |
        Crea una reserva de forma atómica:
        1. Verifica disponibilidad de asientos
        2. Aplica descuento si se envía `promotionCode`
        3. Crea la reserva y sus pasajeros
        4. Decrementa `availableSeats`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [flightClassId, passengers]
              properties:
                flightClassId:
                  type: string
                  format: uuid
                  example: "clx1abc-def-ghi"
                passengers:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [firstName, lastName, documentNumber]
                    properties:
                      firstName:      { type: string, example: "Juan" }
                      lastName:       { type: string, example: "Pérez" }
                      documentNumber: { type: string, example: "1234567890" }
                      seatNumber:     { type: string, nullable: true, example: "14C" }
                promotionCode:
                  type: string
                  example: "VERANO25"
      responses:
        '201':
          description: Reserva creada exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Reservation' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422':
          description: Sin disponibilidad de asientos
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservations/{reservationId}:
    parameters:
      - name: reservationId
        in: path
        required: true
        schema: { type: string }
        description: ID de la reserva
    get:
      tags: [Reservations]
      summary: Obtener detalle de una reserva
      responses:
        '200':
          description: Reserva encontrada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Reservation' }
        '404': { $ref: '#/components/responses/NotFound' }

  /reservations/{reservationId}/cancel:
    parameters:
      - name: reservationId
        in: path
        required: true
        schema: { type: string }
        description: ID de la reserva a cancelar
    patch:
      tags: [Reservations]
      summary: Cancelar reserva
      description: |
        Cancela la reserva en una sola transacción atómica:
        - Estado → `CANCELLED`
        - Restaura `availableSeats` en la clase de vuelo
        - Decrementa `currentUsages` de la promoción si aplica
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Reserva cancelada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          cancelled:       { type: boolean, example: true }
                          reservationCode: { type: string, example: "A3F7B2C1" }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── PAYMENTS ─────────────────────────────────────────────────
  /payments:
    post:
      tags: [Payments]
      summary: Registrar pago
      description: |
        Registra el pago de una reserva y genera la factura automáticamente
        (IVA 15%) de forma asíncrona.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reservationId, amount, provider, transactionId]
              properties:
                reservationId: { type: string, format: uuid }
                amount:        { type: number, minimum: 0, exclusiveMinimum: true, example: 178.00 }
                provider:      { type: string, example: "VISA" }
                transactionId: { type: string, example: "TXN-20250615-001" }
                status:        { type: string, enum: [PENDING, COMPLETED, FAILED, REFUNDED], default: COMPLETED }
      responses:
        '201':
          description: Pago registrado. Factura generada de forma asíncrona.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Payment' }
        '400': { $ref: '#/components/responses/BadRequest' }

  # ── PROMOTIONS ───────────────────────────────────────────────
  /promotions/validate:
    post:
      tags: [Promotions]
      summary: Validar código de promoción
      description: |
        Verifica que el código esté activo y con usos disponibles,
        y calcula el descuento sobre el monto indicado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, amount]
              properties:
                code:   { type: string, example: "VERANO25" }
                amount: { type: number, minimum: 0, exclusiveMinimum: true, example: 178.00 }
      responses:
        '200':
          description: Resultado de la validación
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MetaEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          valid:          { type: boolean }
                          code:           { type: string }
                          discountType:   { type: string, enum: [PERCENTAGE, FIXED_AMOUNT] }
                          discountValue:  { type: number }
                          discountAmount: { type: number }
                          finalAmount:    { type: number }
        '400': { $ref: '#/components/responses/BadRequest' }

# ============================================================
#   TAGS
# ============================================================
tags:
  - name: Status
    description: Estado y metadatos del servicio
  - name: Airports
    description: Catálogo de aeropuertos
  - name: Flights
    description: Búsqueda, detalle y disponibilidad de vuelos
  - name: Reservations
    description: Creación, consulta y cancelación de reservas
  - name: Payments
    description: Registro de pagos
  - name: Promotions
    description: Validación de códigos de descuento